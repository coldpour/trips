[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "vite --port 5173"
  targetPort = 5173
  port = 8888

[[edge_functions]]
  function = "ticketmaster"
  path = "/api/ticketmaster"

[[edge_functions]]
  function = "eventbrite"
  path = "/api/eventbrite"

[[edge_functions]]
  function = "bandsintown"
  path = "/api/bandsintown"
